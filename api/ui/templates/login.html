<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeOS · Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-semibold mb-1 text-center">HomeOS</h1>
    <p class="text-slate-400 text-sm text-center mb-6">Enter your API key to continue</p>

    {% if error %}
    <div class="bg-red-900/40 border border-red-700 text-red-300 rounded-lg px-4 py-3 text-sm mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" class="space-y-4">
      <input type="hidden" name="next" value="{{ next }}">
      <div>
        <label class="block text-xs text-slate-400 mb-1">API key</label>
        <input type="password" name="api_key" autofocus autocomplete="current-password"
               class="w-full bg-slate-900 border border-slate-700 text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg py-2.5 text-sm transition-colors">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
