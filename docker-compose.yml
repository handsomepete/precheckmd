version: "3.9"

networks:
  nox_net:
    name: nox_net

services:
  postgres:
    image: pgvector/pgvector:pg16
    networks: [nox_net]
    environment:
      POSTGRES_USER: nox
      POSTGRES_PASSWORD: nox
      POSTGRES_DB: nox
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nox"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks: [nox_net]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    networks: [nox_net]
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    networks: [nox_net]
    env_file: .env
    environment:
      SANDBOX_IMAGE: nox-sandbox
      SANDBOX_NETWORK: nox_net
      SCRATCH_BASE: /tmp/nox_scratch
    volumes:
      - artifacts:/artifacts
      - /tmp/nox_scratch:/tmp/nox_scratch
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: rq worker nox --url "${REDIS_URL}"

  # Sandbox image - built but not started as a persistent service.
  # The worker spawns ephemeral sandbox containers from this image.
  # Build with: docker-compose build sandbox
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    image: nox-sandbox
    networks: [nox_net]
    profiles:
      - sandbox-build
    command: ["echo", "sandbox image ready"]

volumes:
  pgdata:
  artifacts:
